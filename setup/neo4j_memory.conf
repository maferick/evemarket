# SupplyCore Neo4j Memory Configuration
#
# Reference:
#   - https://neo4j.com/docs/graph-data-science/current/common-usage/memory-estimation/
#   - https://neo4j.com/docs/operations-manual/current/performance/memory-configuration/
#   - https://neo4j.com/docs/graph-data-science/current/production-deployment/configuration-settings/
#
# Companion document: docs/NEO4J_MEMORY_SIZING.md
#
# Target host profile: 128 GB RAM, 32 hardware threads, SHARED with MariaDB +
# PHP-FPM + Python workers + Redis. This file is the *aggressive* profile that
# gives Neo4j/GDS enough heap to run Phase 1–3 of neo4j_ml_exploration on the
# lifetime character combat projection. If MariaDB is the hot-path bottleneck
# (heavy market_orders_history scans), use the "conservative" column from
# docs/NEO4J_MEMORY_SIZING.md instead and shrink heap to 16G / pagecache to 24G.
#
# Copy this file to /etc/neo4j/neo4j.conf (or merge the keys into it) and
# restart the service:
#   sudo systemctl restart neo4j
#
# Validate with:
#   sudo -u neo4j bin/neo4j-admin server memory-recommendation
# and compare the reported "Total size of data and native indexes" to the
# server.memory.pagecache.size set below.

# ── JVM Heap ────────────────────────────────────────────────────────────────
# IMPORTANT for GDS: projected graphs, algorithm state, FastRP embeddings, and
# Leiden/Louvain community arrays ALL live on the JVM heap. Page cache does
# NOT help GDS workloads — only heap does. See docs/NEO4J_MEMORY_SIZING.md §3.
#
# Stay BELOW 32 GB so the JVM keeps compressed object pointers (saves ~1.5×
# heap vs. going to 32G+). 31G is the practical cap for GDS-heavy deployments.
#
# Set initial and max to the same value to avoid stop-the-world resize pauses.
server.memory.heap.initial_size=31g
server.memory.heap.max_size=31g

# ── Page Cache ──────────────────────────────────────────────────────────────
# Rule of thumb: ≥ size of store files + native indexes.
# Run `neo4j-admin server memory-recommendation` to get an exact number for
# this instance. For a SupplyCore deployment dominated by Character +
# Killmail + Battle + *_OCCURS_WITH edges, a 32 GB page cache comfortably
# holds the entire store + indexes with room for growth.
server.memory.pagecache.size=32g

# ── Transaction Memory ──────────────────────────────────────────────────────
# Caps the total off-heap memory that concurrent write transactions can hold.
# SupplyCore graph_pipeline uses bounded 800-row batches so any single tx is
# small, but we have several sync jobs running simultaneously during the
# compute lane burst window.
dbms.memory.transaction.total.max=2g
db.memory.transaction.total.max=2g
db.memory.transaction.max=512m

# ── GDS Memory Safety ───────────────────────────────────────────────────────
# Use the *maximum* side of each estimate when the pre-flight memory guard
# decides whether a job can run. Without this, GDS uses the minimum estimate
# and occasionally lets a job start that then OOMs mid-run, which on a shared
# host will cascade into MariaDB pressure.
gds.validate_using_max_memory_estimation=true

# Keep progress tracking enabled so `CALL gds.listProgress()` reports live
# heap consumption during long-running projections / algorithms.
gds.progress_tracking_enabled=true

# ── GDS Security ────────────────────────────────────────────────────────────
# Required for GDS to access low-level Neo4j components. Without these two
# keys GDS procedures fail at startup with "procedure not whitelisted" errors.
dbms.security.procedures.unrestricted=gds.*,apoc.*
dbms.security.procedures.allowlist=gds.*,apoc.*

# ── JVM / GC tuning for GDS ─────────────────────────────────────────────────
# G1GC with 32 MB regions handles the large humongous allocations GDS
# projections produce (relationship arrays, FastRP embedding buffers) without
# fragmenting the old generation.
server.jvm.additional=-XX:+UseG1GC
server.jvm.additional=-XX:G1HeapRegionSize=32m
server.jvm.additional=-XX:+AlwaysPreTouch
server.jvm.additional=-XX:+ParallelRefProcEnabled
server.jvm.additional=-XX:+DisableExplicitGC
# Emit a GC log we can correlate with graph_health_snapshots on OOM incidents.
server.jvm.additional=-Xlog:gc*:file=/var/log/neo4j/gc.log:time,uptime,level,tags:filecount=5,filesize=20M

# ── Query timeout ───────────────────────────────────────────────────────────
# Matches the longest timeout our jobs pass (neo4j_ml_exploration uses 300s
# for Leiden / FastRP). A hard cap prevents a runaway projection from pinning
# heap indefinitely on a shared host.
db.transaction.timeout=600s

# ── Connector thread pool ───────────────────────────────────────────────────
# Leave headroom for MariaDB + PHP workers on a 32-thread CPU. The orchestrator
# runs at most ~8 concurrent Cypher requests across lanes; 16 worker threads
# is plenty and avoids starving other services on the shared host.
server.bolt.thread_pool_min_size=4
server.bolt.thread_pool_max_size=16
server.http.enabled=true
server.bolt.enabled=true
